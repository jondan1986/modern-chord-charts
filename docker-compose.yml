services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

  chord-charts:
    image: ghcr.io/jondan1986/modern-chord-charts:latest
    expose:
      - "3000"
    volumes:
      - chord_data:/app/data
    restart: unless-stopped

volumes:
  chord_data:
  caddy_data:
